<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDial</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #111318 0%, #0D0F14 100%);
      color: #E8DCC8;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2A2E38;
    }

    .header svg {
      width: 28px;
      height: 28px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #C9A84C;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #1A1D24;
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #2ECC71;
      box-shadow: 0 0 8px #2ECC71;
    }

    .status-dot.connecting {
      background: #F39C12;
      animation: pulse 1s infinite;
    }

    .status-dot.error {
      background: #E74C3C;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      flex: 1;
      font-size: 13px;
      color: #A0A0A0;
    }

    .status-text.connected {
      color: #2ECC71;
    }

    .info-section {
      background: #1A1D24;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-label {
      font-size: 12px;
      color: #707070;
    }

    .info-value {
      font-size: 13px;
      color: #E8DCC8;
      font-family: 'Consolas', monospace;
    }

    .info-value.highlight {
      color: #C9A84C;
      font-weight: 600;
    }

    .hint {
      padding: 10px 12px;
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 6px;
      font-size: 11px;
      color: #A09070;
      line-height: 1.6;
    }

    .hint-title {
      color: #C9A84C;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" fill="#1A1D24" stroke="#C9A84C" stroke-width="2"/>
      <path d="M10 14 L14 18 L22 10" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>AutoDial</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot connecting" id="statusDot"></div>
    <span class="status-text" id="statusText">正在连接...</span>
  </div>

  <div class="info-section">
    <div class="info-row">
      <span class="info-label">本机IP</span>
      <span class="info-value highlight" id="localIP">--</span>
    </div>
    <div class="info-row">
      <span class="info-label">配对码</span>
      <span class="info-value highlight" id="pinCode">----</span>
    </div>
    <div class="info-row">
      <span class="info-label">手机连接</span>
      <span class="info-value" id="phoneStatus">--</span>
    </div>
  </div>

  <div class="hint">
    <div class="hint-title">💡 使用说明</div>
    1. 确保 AutoDial PC端已运行<br>
    2. 手机端输入IP和配对码连接<br>
    3. 打开CRM，点击号码旁的"拨打"
  </div>

  <div class="footer">
    v1.2 | 点击拨打 = 复制号码 + 触发拨号
  </div>

  <script src="popup.js"></script>
</body>
</html>
