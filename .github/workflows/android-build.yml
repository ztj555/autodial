name: Android Build

# v4.0.0 整合版

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept SDK Licenses
      run: yes | sdkmanager --licenses || true
      shell: bash
    
    - name: Decode Keystore from Secret
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-app/autodial-release.p12
        ls -la android-app/autodial-release.p12
      shell: bash
    
    - name: Install Gradle and generate wrapper
      run: |
        # Install Gradle
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PWD/gradle-8.2/bin:$PATH
        gradle --version
        # Generate proper wrapper
        cd android-app
        gradle wrapper --gradle-version 8.2
        ls -la gradlew
      shell: bash
    
    - name: Build Release APK
      working-directory: ./android-app
      run: ./gradlew assembleRelease --stacktrace
      env:
        KEYSTORE_FILE: autodial-release.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    
    - name: Build Debug APK
      working-directory: ./android-app
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload Release APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android-app/app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-app/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
