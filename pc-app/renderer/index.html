<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDial</title>
  <style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0C040;
    --gold-dark: #8B6914;
    --bg: #111318;
    --bg2: #1A1D24;
    --bg3: #22262F;
    --text: #E8DCC8;
    --text2: #A09070;
    --green: #2ECC71;
    --red: #E74C3C;
    --radius-sm: 5px;
    --radius-md: 10px;
    --radius-lg: 24px;
    --shadow: none;
    --font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    --gradient-green: linear-gradient(135deg, #27AE60, #1E8449);
    --gradient-red: linear-gradient(135deg, #C0392B, #96281B);
    --glow-text: none;
    --floatbar-bg: rgba(26, 29, 36, 0.72);
    --floatbar-border: rgba(201, 168, 76, 0.25);
    --floatbar-blur: blur(20px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-family);
    overflow: hidden;
    user-select: none;
  }
  .wrap {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ---- 自定义标题栏 ---- */
  .titlebar {
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-dark);
    padding: 0;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    -webkit-app-region: drag;
    height: 36px;
  }
  .titlebar .logo {
    padding-left: 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 20px; height: 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .titlebar-btns {
    display: flex;
    margin-left: auto;
    height: 100%;
    -webkit-app-region: no-drag;
  }
  .titlebar-btn {
    width: 46px; height: 36px;
    background: none; border: none;
    color: var(--text2);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
    -webkit-app-region: no-drag;
  }
  .titlebar-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .titlebar-btn.close:hover { background: #C42B1C; color: white; }

  /* ---- 状态栏 ---- */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-dark);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .chips {
    display: flex;
    gap: 6px;
    flex: 1;
    justify-content: center;
  }
  .chip {
    background: var(--bg);
    border: 1px solid var(--gold-dark);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    text-align: center;
  }
  .chip .lbl { font-size: 9px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
  .chip .val { font-size: 13px; font-weight: 700; color: var(--gold-light); letter-spacing: 2px; }
  .chip .val.ip { font-size: 12px; letter-spacing: 0.5px; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .status-dot.on {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.5s infinite;
  }
  .restart-icon {
    margin-left: 8px; padding: 0 4px; font-size: 11px; cursor: pointer;
    color: var(--text2); opacity: 0.5; transition: all 0.2s;
    line-height: 1; display: inline; user-select: none;
  }
  .restart-icon:hover { opacity: 1; color: var(--gold); }
  .restart-icon.spinning { animation: spin 0.8s linear infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .status-text { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .topmost-switch {
    display: flex; align-items: center; gap: 4px;
    cursor: pointer; user-select: none;
    flex-shrink: 0;
  }
  .topmost-switch input { display: none; }
  .topmost-switch .sw-track {
    width: 28px; height: 14px;
    background: var(--bg);
    border-radius: 7px;
    position: relative;
    transition: background 0.2s;
    border: 1px solid var(--text2);
  }
  .topmost-switch .sw-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text2);
    transition: all 0.2s;
  }
  .topmost-switch input:checked + .sw-track {
    background: var(--gold-dark);
    border-color: var(--gold);
  }
  .topmost-switch input:checked + .sw-track::after {
    left: 16px;
    background: var(--gold-light);
  }
  .topmost-switch .sw-label { font-size: 10px; color: var(--text2); }

  /* ---- 手机选择器 ---- */
  .phone-selector {
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-dark);
    padding: 6px 14px;
    display: none;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .phone-selector.show { display: flex; }
  .phone-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .phone-tag {
    background: var(--bg);
    border: 1px solid var(--bg3);
    border-radius: var(--radius-md);
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .phone-tag:hover { border-color: var(--gold-dark); color: var(--text); background: var(--bg3); }
  .phone-tag.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.1);
    box-shadow: 0 0 6px rgba(201,168,76,0.15);
  }
  .phone-tag .phone-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .phone-tag .phone-name {
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .phone-tag .phone-note-hint {
    font-size: 9px;
    color: var(--text2);
    margin-left: 2px;
  }
  .phone-tag.active .phone-note-hint { color: var(--gold); }
  .phone-reconnect-btn {
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: auto; padding: 2px 8px;
    background: transparent; border: 1px solid var(--bg3); border-radius: var(--radius-sm);
    color: var(--text2); font-size: 10px; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .phone-reconnect-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  .phone-reconnect-btn.spinning { color: var(--gold); border-color: var(--gold); pointer-events: none; }
  .phone-rename-input {
    background: var(--bg);
    border: 1px solid var(--gold);
    border-radius: var(--radius-sm);
    padding: 3px 8px;
    font-size: 11px;
    color: var(--text);
    outline: none;
    width: 120px;
  }

  /* ---- 连接成功横幅 ---- */
  .banner {
    display: none;
    background: rgba(46,204,113,0.12);
    border-bottom: 1px solid var(--green);
    padding: 6px 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .banner.show { display: block; }

  /* ---- 主内容区 ---- */
  .body {
    flex: 1;
    padding: 8px 12px 6px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .body::-webkit-scrollbar { width: 3px; }
  .body::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* 号码输入框 */
  .number-box {
    background: var(--bg2);
    border: 2px solid var(--gold-dark);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    flex-shrink: 0;
  }
  .number-box:focus-within { border-color: var(--gold); }
  .number-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .number-lbl { font-size: 9px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
  .clip-hint { font-size: 9px; color: var(--gold); }
  .clip-hint.flash { animation: flash 0.4s ease; }
  @keyframes flash { 50%{ color: var(--gold-light); } }
  .number-input {
    background: none; border: none; outline: none;
    font-size: 24px; font-weight: 700;
    color: var(--text); width: 100%;
    letter-spacing: 3px; caret-color: var(--gold);
  }
  .number-input::placeholder { color: var(--text2); font-size: 14px; font-weight: 400; letter-spacing: 1px; }
  .number-actions { display: flex; gap: 6px; margin-top: 6px; }
  .btn-sm {
    background: none;
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear { border: 1px solid var(--bg3); color: var(--text2); }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* 拨号盘 */
  .dialpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    flex-shrink: 0;
  }
  .dial-btn {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: var(--radius-md);
    padding: 7px 0;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0px;
  }
  .dial-btn:hover { background: var(--bg3); border-color: var(--gold-dark); }
  .dial-btn:active { transform: scale(0.93); background: rgba(201,168,76,0.1); border-color: var(--gold); }
  .dial-btn .num { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1; }
  .dial-btn .sub { font-size: 7px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; }
  .dial-btn.del .num { font-size: 16px; color: var(--red); }

  /* 操作按钮 */
  .action-row { display: flex; gap: 6px; flex-shrink: 0; }
  .call-btn {
    flex: 1;
    padding: 10px;
    background: var(--gradient-green);
    border: none; border-radius: var(--radius-md);
    color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 1px;
  }
  .call-btn:hover:not(:disabled) { background: var(--gradient-green); filter: brightness(1.15); box-shadow: 0 6px 18px rgba(39,174,96,0.35); }
  .call-btn:disabled { background: var(--bg3); color: var(--red); cursor: default; opacity: 0.7; font-size: 14px; }
  .hangup-btn {
    flex: 1;
    padding: 10px;
    background: var(--gradient-red);
    border: none; border-radius: var(--radius-md);
    color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 1px;
  }
  .hangup-btn:hover:not(:disabled) { background: var(--gradient-red); filter: brightness(1.15); }
  .hangup-btn:disabled { background: var(--bg3); color: var(--red); cursor: default; opacity: 0.7; font-size: 14px; }

  /* 发短信按钮 */
  .sms-row { flex-shrink: 0; }
  .sms-btn {
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px dashed var(--gold-dark);
    border-radius: var(--radius-md);
    color: var(--gold);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .sms-btn:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }

  /* 主界面快捷短信模板 */
  .index-tpl-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .index-tpl-tag {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: var(--radius-md);
    padding: 4px 9px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .index-tpl-tag:hover { border-color: var(--gold-dark); color: var(--gold); background: rgba(201,168,76,0.07); }
  .index-tpl-tag:active { transform: scale(0.94); }

  /* ---- 日志区（折叠） ---- */
  .log-section { flex-shrink: 0; }
  .log-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background: var(--bg2);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 11px;
    color: var(--text2);
    border: 1px solid var(--bg3);
    transition: border-color 0.2s;
  }
  .log-toggle:hover { border-color: var(--gold-dark); }
  .log-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
  .log-toggle.open .arrow { transform: rotate(180deg); }
  .log-body {
    display: none;
    max-height: 130px;
    overflow-y: auto;
    padding: 6px 8px;
    gap: 4px;
    flex-direction: column;
    background: var(--bg2);
    border-radius: 0 0 8px 8px;
    border: 1px solid var(--bg3);
    border-top: none;
    margin-top: -1px;
  }
  .log-body.open { display: flex; }
  .log-body::-webkit-scrollbar { width: 3px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
  .log-entry {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 11px; padding: 3px 6px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    border-left: 2px solid var(--bg3);
    animation: fadein 0.2s;
  }
  @keyframes fadein { from{opacity:0;} to{opacity:1;} }
  .log-entry.success { border-left-color: var(--green); }
  .log-entry.error   { border-left-color: var(--red);   }
  .log-entry.info    { border-left-color: var(--gold);  }
  .log-entry .lt { color: var(--text2); flex-shrink: 0; font-size: 10px; }
  .log-entry .lm { color: var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--gold-dark);
    border-radius: var(--radius-md); padding: 8px 18px;
    font-size: 12px; color: var(--text);
    transition: transform 0.25s; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red);   }
</style>
<script src="../themes/theme-data.js"></script>
<script src="js/theme.js"></script>
</head>
<body>
<div class="wrap">
  <!-- 自定义标题栏 -->
  <div class="titlebar">
    <div class="logo"><div class="logo-icon">&#x1F4DE;</div>AutoDial</div>
    <div class="titlebar-btns">
      <button class="titlebar-btn" id="btnSettings" title="设置"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
      <button class="titlebar-btn" id="btnMinimize" title="最小化"><svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg></button>
      <button class="titlebar-btn close" id="btnClose" title="关闭"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg></button>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="header">
    <div class="chips">
      <div class="chip"><div class="lbl">IP</div><div class="val ip" id="localIP">&#x2026;</div></div>
      <div class="chip"><div class="lbl">配对码</div><div class="val" id="pinCode">----</div></div>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">等待连接</div>
    <span class="restart-icon" id="restartCloudIcon" title="重连云端">☁</span>
    <span class="restart-icon" id="restartAppIcon" title="重启软件">⟳</span>
    <label class="topmost-switch" title="窗口置顶">
      <input type="checkbox" id="topmostToggle">
      <span class="sw-track"></span>
      <span class="sw-label">置顶</span>
    </label>
    <label class="topmost-switch" title="悬浮横条">
      <input type="checkbox" id="floatbarToggle" checked>
      <span class="sw-track"></span>
      <span class="sw-label">悬浮条</span>
    </label>
  </div>

  <div class="banner" id="banner">&#x2705; 手机已连接，可以拨号</div>

  <!-- 多手机选择器 -->
  <div class="phone-selector" id="phoneSelector">
    <div class="phone-list" id="phoneList"></div>
  </div>

  <div class="body">
    <div class="number-box">
      <div class="number-row">
        <span class="number-lbl">号码</span>
        <span class="clip-hint" id="clipHint">&#x1F4CB; 已跟随剪贴板</span>
      </div>
      <input type="text" class="number-input" id="numberInput"
             placeholder="复制号码自动出现&#x2026;" maxlength="20"
             inputmode="tel" autocomplete="off">
      <div class="number-actions">
        <button class="btn-sm btn-clear" id="btnClear">清除</button>
      </div>
    </div>

    <div class="dialpad">
      <button class="dial-btn" data-key="1"><span class="num">1</span></button>
      <button class="dial-btn" data-key="2"><span class="num">2</span><span class="sub">ABC</span></button>
      <button class="dial-btn" data-key="3"><span class="num">3</span><span class="sub">DEF</span></button>
      <button class="dial-btn" data-key="4"><span class="num">4</span><span class="sub">GHI</span></button>
      <button class="dial-btn" data-key="5"><span class="num">5</span><span class="sub">JKL</span></button>
      <button class="dial-btn" data-key="6"><span class="num">6</span><span class="sub">MNO</span></button>
      <button class="dial-btn" data-key="7"><span class="num">7</span><span class="sub">PQRS</span></button>
      <button class="dial-btn" data-key="8"><span class="num">8</span><span class="sub">TUV</span></button>
      <button class="dial-btn" data-key="9"><span class="num">9</span><span class="sub">WXYZ</span></button>
      <button class="dial-btn" data-key="*"><span class="num">&#x2731;</span></button>
      <button class="dial-btn" data-key="0"><span class="num">0</span><span class="sub">+</span></button>
      <button class="dial-btn del" data-key="del"><span class="num">&#x232B;</span></button>
    </div>

    <div class="action-row">
      <button class="call-btn" id="callBtn" disabled>&#x1F4DE; 拨号</button>
      <button class="hangup-btn" id="hangupBtn" disabled>&#x1F4F5; 挂断</button>
    </div>
    <div class="sms-row">
      <button class="sms-btn" id="smsBtn">&#x1F4AC; 发短信</button>
      <div class="index-tpl-list" id="indexTplList"></div>
    </div>

    <div class="log-section">
      <div class="log-toggle" id="logToggle">
        <span>&#x1F4DD; 日志</span>
        <span class="arrow">&#x25BC;</span>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* window.api 通过 preload.js contextBridge 注入，不能再用 const api 声明（会冲突） */

let isConnected = false;
let lastDialPin = null;   // v6: 上一次拨号的手机 PIN（重连优先级最高）
let activePin = null;     // v6: 当前活跃手机 PIN
let lastClipboard = '';
let clipboardTimer = null;
let logOpen = false;
let currentPhones = [];  // 当前手机列表
let currentActiveId = null;  // 当前活跃手机ID

// ==================== 标题栏按钮 ====================
document.getElementById('btnSettings').addEventListener('click', () => {
  window.api.send('open-settings');
});
document.getElementById('btnMinimize').addEventListener('click', () => {
  window.api.send('window-control', 'minimize');
});
document.getElementById('btnClose').addEventListener('click', () => {
  window.api.send('window-control', 'close');
});

// ==================== 置顶开关 ====================
document.getElementById('topmostToggle').addEventListener('change', function() {
  window.api.send('set-topmost', this.checked);
});

// ==================== 悬浮横条开关 ====================
document.getElementById('floatbarToggle').addEventListener('change', function() {
  window.api.send('toggle-floatbar', this.checked);
});

// ==================== 拨号盘事件 ====================
document.querySelectorAll('.dial-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.getAttribute('data-key');
    if (key === 'del') {
      deleteLast();
    } else {
      pressKey(key);
    }
  });
});

document.getElementById('btnClear').addEventListener('click', clearNumber);
document.getElementById('callBtn').addEventListener('click', dial);
document.getElementById('hangupBtn').addEventListener('click', hangup);
document.getElementById('logToggle').addEventListener('click', toggleLog);
document.getElementById('smsBtn').addEventListener('click', () => {
  const number = document.getElementById('numberInput').value.trim().replace(/\s/g, '');
  window.api.send('open-sms', number || '');
});

// ==================== 按钮状态文字 ====================
function updateCallBtnText() {
  const btn = document.getElementById('callBtn');
  btn.style.pointerEvents = '';  // v6: 始终恢复可点击性
  if (btn.disabled) {
    btn.textContent = '\uD83D\uDD0D 请输入号码';
  } else if (!isConnected) {
    // v6: 未连接 → 重连按钮
    btn.textContent = '\uD83D\uDD04 重连手机';
  } else {
    btn.innerHTML = '\uD83D\uDCDE \u62E8\u53F7';
  }
}
function updateHangupBtnText() {
  const btn = document.getElementById('hangupBtn');
  if (btn.disabled) {
    btn.textContent = '\uD83D\uDCF1 请连接手机';
  } else {
    btn.innerHTML = '\uD83D\uDD0E \u6302\u65AD';
  }
}
const callBtn = document.getElementById('callBtn');
const hangupBtn = document.getElementById('hangupBtn');
new MutationObserver(updateCallBtnText).observe(callBtn, { attributes: true, attributeFilter: ['disabled'] });
new MutationObserver(updateHangupBtnText).observe(hangupBtn, { attributes: true, attributeFilter: ['disabled'] });
updateCallBtnText();
updateHangupBtnText();

// 输入框变化时更新拨打按钮 disabled 状态
document.getElementById('numberInput').addEventListener('input', function() {
  // v6: 未连接时不禁用，作为重连按钮使用
  document.getElementById('callBtn').disabled = isConnected && !this.value.trim();
  updateCallBtnText();
});

// ==================== 初始化 ====================
async function init() {
  // 重试拿初始信息，最多5次
  let info = null;
  for (let i = 0; i < 5; i++) {
    try {
      info = await window.api.invoke('get-info');
      break;
    } catch (e) {
      await new Promise(r => setTimeout(r, 500));
    }
  }
  if (info) {
    document.getElementById('localIP').textContent = info.ip || '--';
    document.getElementById('pinCode').textContent = info.pin || '----';
    if (info.connected) setPhoneConnected(true, null);
    if (info.firewall === 'warning') addLog('error', '防火墙可能拦截连接，请以管理员运行');
  } else {
    document.getElementById('localIP').textContent = '获取失败';
  }

  pollClipboard();

  // IPC 事件监听
  window.api.on('status-update', (data) => setPhoneConnected(data.connected, data.phoneIP));
  window.api.on('phones-update', (data) => {
    activePin = data.activeId;  // v6: 同步活跃手机 PIN
    updatePhoneSelector(data.phones, data.activeId);
    updateCallBtnText();  // v6: 手机列表变化时恢复按钮状态（防止卡"正在唤醒"）
  });
  // v6: 强制重连结果
  window.api.on('force-reconnect-result', (data) => {
    // 恢复 phone-tag 上的小按钮
    const list = document.getElementById('phoneList');
    list.querySelectorAll('.phone-reconnect-btn').forEach(btn => {
      btn.classList.remove('spinning');
      btn.textContent = '🔄';
    });
    // 恢复主拨号按钮
    const callBtn = document.getElementById('callBtn');
    callBtn.style.pointerEvents = '';
    updateCallBtnText();
    if (!data.success) {
      showToast(data.error || '唤醒手机失败', 'error');
    }
  });
  window.api.on('info-push', (data) => {
    document.getElementById('localIP').textContent = data.ip || '--';
    document.getElementById('pinCode').textContent = data.pin || '----';
  });
  window.api.on('floatbar-visible-changed', (visible) => {
    document.getElementById('floatbarToggle').checked = visible;
  });
  window.api.on('dial-result', (data) => {
    addLog(data.status === 'ok' ? 'success' : 'error', data.number + ' ' + (data.status === 'ok' ? '&#x2713;' : '&#x2717;'));
  });
  window.api.on('dial-sent', (data) => {
    addLog('success', '\uD83D\uDCDE 已发送: ' + data.number);
    // v6: 记录拨号时的活跃手机 PIN，用于重连优先
    if (data.phoneId) lastDialPin = data.phoneId;
  });
  // v6: 拨号请求触发自动唤醒时的反馈
  window.api.on('dial-waking', (data) => {
    addLog('info', '\u23F3 正在唤醒手机(PIN=' + data.pin + ')...拨号排队中');
    if (data.number) showToast('正在唤醒手机，将自动拨号 ' + data.number);
  });
  // v6: 排队拨号超时
  window.api.on('dial-timeout', (data) => {
    addLog('error', '\u274C 拨号超时: ' + data.number + ' (30s未响应)');
    showToast('拨号超时，正在尝试云端恢复...', 'error');
    updateCallBtnText();
    // v6: 拨号超时自动触发云端轻量恢复
    window.api.send('dial-failed-trigger-recovery');
  });

  // v6: 重启图标点击
  document.getElementById('restartCloudIcon').addEventListener('click', () => {
    const icon = document.getElementById('restartCloudIcon');
    icon.classList.add('spinning');
    window.api.send('restart-cloud');
    setTimeout(() => icon.classList.remove('spinning'), 3000);
    addLog('info', '云端重连已触发');
  });
  document.getElementById('restartAppIcon').addEventListener('click', () => {
    if (confirm('确定要重启 AutoDial 吗？\n\n重启后会自动恢复，约需 3-5 秒。')) {
      window.api.send('restart-app');
    }
  });

  window.api.on('hangup-sent', () => {
    addLog('info', '已发送挂断');
  });
  window.api.on('server-log', (data) => {
    const lvl = data.level === 'error' ? 'error' : data.level === 'warn' ? 'error' : 'info';
    addLog(lvl, '&#x1F5A5; ' + data.text);
  });
  window.api.on('error', (data) => {
    showToast(data.message, 'error');
    addLog('error', data.message);
  });
}

function setPhoneConnected(connected, phoneIP) {
  isConnected = connected;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const banner = document.getElementById('banner');
  const callBtn = document.getElementById('callBtn');
  const hasNumber = document.getElementById('numberInput').value.trim();
  callBtn.disabled = connected && !hasNumber;  // v6: 未连接时不禁用(重连按钮)
  document.getElementById('hangupBtn').disabled = !connected;
  if (connected) {
    dot.className = 'status-dot on';
    txt.textContent = phoneIP ? phoneIP : '已连接';
    banner.className = 'banner show';
  } else {
    dot.className = 'status-dot';
    txt.textContent = '等待连接';
    banner.className = 'banner';
  }
}

// ==================== 多手机选择器 ====================
function updatePhoneSelector(phones, activeId) {
  currentPhones = phones || [];
  currentActiveId = activeId;
  const selector = document.getElementById('phoneSelector');
  const list = document.getElementById('phoneList');
  const banner = document.getElementById('banner');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');

  if (currentPhones.length === 0) {
    selector.className = 'phone-selector';
    isConnected = false;
    dot.className = 'status-dot';
    txt.textContent = '等待连接';
    banner.className = 'banner';
    // v6: 未连接时不禁用拨号按钮，作为重连按钮
    document.getElementById('callBtn').disabled = false;
    document.getElementById('hangupBtn').disabled = true;
    updateCallBtnText();
    updateHangupBtnText();
    return;
  }

  isConnected = true;
  dot.className = 'status-dot on';
  selector.className = 'phone-selector show';

  // 多手机时 banner 显示数量
  if (currentPhones.length > 1) {
    banner.className = 'banner show';
    banner.innerHTML = '&#x2705; ' + currentPhones.length + '部手机已连接';
  } else {
    banner.className = 'banner show';
    banner.innerHTML = '&#x2705; 手机已连接，可以拨号';
  }

  // 更新状态栏文字
  const activePhone = currentPhones.find(p => p.id === activeId);
  if (activePhone) {
    const display = activePhone.note || activePhone.name;
    txt.textContent = display;
  }

  // 渲染手机标签
  list.innerHTML = '';
  currentPhones.forEach(phone => {
    const tag = document.createElement('div');
    tag.className = 'phone-tag' + (phone.id === activeId ? ' active' : '');

    const dotEl = document.createElement('span');
    dotEl.className = 'phone-dot';
    tag.appendChild(dotEl);

    const nameEl = document.createElement('span');
    nameEl.className = 'phone-name';
    nameEl.textContent = phone.note || phone.name;
    tag.appendChild(nameEl);

    if (phone.note) {
      const hint = document.createElement('span');
      hint.className = 'phone-note-hint';
      hint.textContent = '(' + phone.name + ')';
      tag.appendChild(hint);
    }

    // v6: 重连按钮（每个手机标签右侧）
    const reconnectBtn = document.createElement('span');
    reconnectBtn.className = 'phone-reconnect-btn';
    reconnectBtn.title = '强制重连此手机';
    reconnectBtn.textContent = '🔄';
    reconnectBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // 不触发选中切换
      if (reconnectBtn.classList.contains('spinning')) return;
      reconnectBtn.classList.add('spinning');
      reconnectBtn.textContent = '⏳';
      window.api.send('force-reconnect', phone.id);
    });
    tag.appendChild(reconnectBtn);

    // 点击切换活跃手机
    tag.addEventListener('click', () => {
      window.api.send('select-phone', phone.id);
    });

    // 双击编辑备注
    tag.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      startRename(phone.id, phone.note || '');
    });

    list.appendChild(tag);
  });

  // 更新按钮状态
  const hasNumber = document.getElementById('numberInput').value.trim();
  document.getElementById('callBtn').disabled = isConnected && !hasNumber; // v6: 未连接时不禁用
  document.getElementById('hangupBtn').disabled = !isConnected;
  updateCallBtnText();
  updateHangupBtnText();
}

function startRename(phoneId, currentNote) {
  const list = document.getElementById('phoneList');
  const tags = list.querySelectorAll('.phone-tag');
  tags.forEach(tag => {
    if (tag.__phoneId !== phoneId) return;
    // 替换为输入框
    tag.innerHTML = '';
    const input = document.createElement('input');
    input.className = 'phone-rename-input';
    input.value = currentNote;
    input.placeholder = '输入备注名';
    tag.appendChild(input);
    input.focus();
    input.select();

    const finish = () => {
      window.api.send('rename-phone', { id: phoneId, note: input.value.trim() });
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = currentNote; input.blur(); }
    });
  });
  // 给 tags 打标记
  const phoneList = currentPhones;
  tags.forEach((tag, i) => {
    if (phoneList[i]) tag.__phoneId = phoneList[i].id;
  });
}

// ==================== 拨号盘 ====================
function pressKey(key) {
  const inp = document.getElementById('numberInput');
  inp.value += key; inp.focus();
  inp.dispatchEvent(new Event('input'));
}
function deleteLast() {
  const inp = document.getElementById('numberInput');
  inp.value = inp.value.slice(0, -1);
  inp.dispatchEvent(new Event('input'));
}
function clearNumber() {
  document.getElementById('numberInput').value = '';
  document.getElementById('numberInput').dispatchEvent(new Event('input'));
}

function dial() {
  const number = document.getElementById('numberInput').value.trim().replace(/\s/g, '');
  if (!isConnected) {
    // v6: 手机未连接 → 自动重连上一次拨号的手机（或活跃手机）
    const targetPin = lastDialPin || activePin;
    if (!targetPin) { showToast('无可用手机', 'error'); return; }
    const btn = document.getElementById('callBtn');
    btn.textContent = '⏳ 正在唤醒手机...';
    btn.style.pointerEvents = 'none';
    window.api.send('force-reconnect', targetPin);
    addLog('info', '唤醒手机 (PIN=' + targetPin + ')...');
    // 如果有号码，也发送拨号请求（main.js 会自动排队）
    if (number) window.api.send('dial', number);
    return;
  }
  if (!number) { showToast('请输入号码', 'error'); return; }
  // v6: 记录本次拨号的手机 PIN
  lastDialPin = activePin;
  window.api.send('dial', number);
  addLog('info', '发送拨号: ' + number);
}
function hangup() {
  if (!isConnected) { showToast('手机未连接', 'error'); return; }
  window.api.send('hangup');
  addLog('info', '发送挂断');
  showToast('已发送挂断指令');
}

// ==================== 剪贴板 ====================
function extractPhone(text) {
  const m = text.match(/1[3-9]\d{9}|0\d{2,3}[-\s]?\d{7,8}/);
  return m ? m[0].replace(/[-\s]/g, '') : null;
}

function pollClipboard() {
  window.api.invoke('read-clipboard').then(d => {
    if (d.text && d.text !== lastClipboard) {
      lastClipboard = d.text;
      const phone = extractPhone(d.text);
      if (phone) {
        const inp = document.getElementById('numberInput');
        inp.value = phone;
        const hint = document.getElementById('clipHint');
        hint.classList.add('flash');
        setTimeout(() => hint.classList.remove('flash'), 400);
      }
    }
  }).catch(() => {}).finally(() => {
    clipboardTimer = setTimeout(pollClipboard, 1000);
  });
}

// ==================== 日志 ====================
function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('logToggle').classList.toggle('open', logOpen);
  document.getElementById('logBody').classList.toggle('open', logOpen);
}

function addLog(type, msg) {
  const body = document.getElementById('logBody');
  const now = new Date();
  const t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  const el = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.innerHTML = '<span class="lt">' + t + '</span><span class="lm">' + msg + '</span>';
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
  while (body.children.length > 80) body.removeChild(body.firstChild);
  if (!logOpen) { logOpen = true; document.getElementById('logToggle').classList.add('open'); body.classList.add('open'); }
}

let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') dial();
  if (e.key === 'Backspace' && document.activeElement.id !== 'numberInput') deleteLast();
});

// ==================== 主界面快捷短信模板 ====================
const INDEX_TPL_KEY = 'autodial_sms_templates';
const INDEX_TPL_DEFAULTS = [
  { id: 1, title: '回访问候', content: '您好，我是之前联系过您的客服，请问您对我们产品还有什么疑问吗？' },
  { id: 2, title: '催办提醒', content: '您好，温馨提醒您，您的业务办理进度已更新，请及时查看。' },
  { id: 3, title: '会议通知', content: '您好，我们将于明天上午10点召开线上会议，届时请准时参加。' },
  { id: 4, title: '感谢回复', content: '感谢您的咨询与支持，如有其他问题随时联系我们，祝您生活愉快！' },
  { id: 5, title: '节日祝福', content: '值此佳节来临之际，祝您及家人节日快乐，万事如意！' }
];

function indexLoadTemplates() {
  try {
    const raw = localStorage.getItem(INDEX_TPL_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(INDEX_TPL_DEFAULTS));
}

function renderIndexTemplates() {
  const templates = indexLoadTemplates();
  const container = document.getElementById('indexTplList');
  container.innerHTML = '';
  templates.forEach(tpl => {
    const tag = document.createElement('div');
    tag.className = 'index-tpl-tag';
    tag.textContent = tpl.title;
    tag.title = tpl.content;
    tag.addEventListener('click', () => {
      const number = document.getElementById('numberInput').value.trim().replace(/\s/g, '');
      window.api.send('open-sms', { number: number || '', content: tpl.content });
    });
    container.appendChild(tag);
  });
}

// 初始化主题
if (typeof ThemeEngine !== 'undefined') ThemeEngine.initTheme();

// 模板渲染（在init之前，localStorage立即可用）
renderIndexTemplates();

init();
